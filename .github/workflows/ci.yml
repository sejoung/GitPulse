name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect E2E-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright*.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'eslint.config.js'
              - 'tsconfig*.json'

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run frontend quality checks
        run: |
          npm run format:check
          npm run lint:frontend
          npm run build:vite
          npm run test:frontend

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - name: Run Rust quality checks
        run: |
          cargo gp-lint
          cargo gp-check
          cargo gp-test

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
      - frontend-check
    if: >-
      github.event_name != 'pull_request'
      || needs.changes.outputs.e2e == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        env:
          CI: true
        run: npm run test:e2e:smoke
